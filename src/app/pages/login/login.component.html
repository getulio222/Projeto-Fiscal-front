<div class="container">
  <div class="header">Login</div>

  <div *ngIf="errorMsg" class="alert alert-error">{{ errorMsg }}</div>

  <form [formGroup]="form" (ngSubmit)="login()">
    <div class="form-group">
      <label>Usuário</label>
      <input formControlName="usuario" placeholder="Digite seu usuário">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" formControlName="senha" placeholder="Digite sua senha">
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </div>

    <div class="small">Após login, você será direcionado ao menu principal.</div>
  </form>
</div>
