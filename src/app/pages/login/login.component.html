<div class="page">
  <div class="card">
    <div class="header">
      <h2>Login</h2>
      <p>Entre com suas credenciais para acessar o sistema.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="login()" class="form">
      <div class="field">
        <label>Usuário</label>
        <input
          type="text"
          formControlName="usuario"
          placeholder="Digite seu usuário"
          />
      </div>

      <div class="field">
        <label>Senha</label>
        <input
          type="password"
          formControlName="senha"
          placeholder="Digite sua senha"
          />
      </div>

      <div class="actions">
        <button class="btn" type="submit">Entrar</button>
      </div>

      @if (errorMsg) {
        <div class="error">
          {{ errorMsg }}
        </div>
      }

      <div class="hint">
        Após login, você será direcionado ao menu principal.
      </div>
    </form>
  </div>
</div>
