<div class="page">
  <div class="card">
    <h2 class="title">Exclusão</h2>

    <div class="form-row">
      <div class="field">
        <label>CPF</label>
        <input
          type="text"
          [(ngModel)]="cpf"
          placeholder="Informe o CPF para buscar"
          />
      </div>

      <div class="actions">
        <button class="btn btn-blue" type="button" (click)="buscar()">
          Buscar
        </button>
        <button class="btn btn-gray" type="button" (click)="voltar()">
          Voltar
        </button>
      </div>
    </div>

    <div class="divider"></div>

    @if (msg) {
      <div class="msg">{{ msg }}</div>
    }

    <!-- Dados carregados -->
    @if (pessoa) {
      <div class="result">
        <div class="field">
          <label>Nome</label>
          <input type="text" [value]="pessoa.nome" disabled />
        </div>
        <div class="field">
          <label>CPF</label>
          <input type="text" [value]="pessoa.cpf" disabled />
        </div>
        <div class="field">
          <label>Cidade</label>
          <input type="text" [value]="pessoa.cidade" disabled />
        </div>
        <div class="actions bottom">
          <button class="btn btn-red" type="button" (click)="excluir()">
            Excluir
          </button>
          <button class="btn btn-gray" type="button" (click)="voltar()">
            Voltar
          </button>
        </div>
      </div>
    }
  </div>
</div>
