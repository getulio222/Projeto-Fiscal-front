<div class="page">
  <div class="card">
    <h2 class="title">Listagem</h2>

    <div class="form">
      <div class="row">
        <div class="field">
          <label>Nome</label>
          <input type="text" [(ngModel)]="nome" placeholder="Informe o nome" />
        </div>

        <div class="field">
          <label>CPF</label>
          <input type="text" [(ngModel)]="cpf" placeholder="Informe o CPF" />
        </div>

        <div class="field qtd">
          <label>Qtd</label>
          <input type="text" [value]="qtd" disabled />
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-blue" type="button" (click)="buscar()">
          Buscar
        </button>
        <button class="btn btn-gray" type="button" (click)="limpar()">
          Limpar
        </button>
        <button class="btn btn-gray" type="button" (click)="voltar()">
          Voltar
        </button>
      </div>
    </div>

    <div class="divider"></div>

    @if (msg) {
      <div class="msg">{{ msg }}</div>
    }

    @if (resultados.length) {
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Cidade</th>
            </tr>
          </thead>
          <tbody>
            @for (p of resultados; track p) {
              <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.nome }}</td>
                <td>{{ p.cpf }}</td>
                <td>{{ p.cidade }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>
</div>
