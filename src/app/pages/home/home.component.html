<div class="page">
  <div class="window">
    <!-- Barra superior -->
    <div class="topbar">
      <div class="brand">SaaS</div>
      <div class="title">Cadastramento de Pessoas</div>
      <button class="close" type="button" (click)="sair()" aria-label="Fechar">
        X
      </button>
    </div>

    <!-- Conteúdo -->
    <div class="content">
      <div class="candidate">&lt;A evolução depende de você&gt;</div>

      <div class="grid">
        <button class="btn primary" routerLink="/pessoa/cadastro">
          Incluir
        </button>
        <button class="btn primary" routerLink="/pessoa/alteracao">
          Alterar
        </button>
        <button class="btn primary" type="button" routerLink="/pessoa/consulta">
          Consultar
        </button>
        <button class="btn primary" type="button" routerLink="/pessoa/listagem">
          Listagem
        </button>
        <button class="btn primary" type="button" routerLink="/pessoa/exclusao">
          Excluir
        </button>
      </div>

      <div class="footer">
        <button class="btn exit" type="button" (click)="sair()">Sair</button>
      </div>
    </div>
  </div>
</div>
