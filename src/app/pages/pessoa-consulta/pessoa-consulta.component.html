<div class="page">
  <div class="card">
    <h2 class="title">Consulta</h2>

    <div class="form-row">
      <div class="field">
        <label>CPF</label>
        <input
          type="text"
          [(ngModel)]="cpf"
          placeholder="Informe o CPF para buscar"
        />
      </div>

      <div class="actions">
        <button class="btn btn-blue" type="button" (click)="buscar()">
          Buscar
        </button>
        <button class="btn btn-gray" type="button" (click)="voltar()">
          Voltar
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <div *ngIf="msg" class="msg">{{ msg }}</div>

    <!-- Resultado: campos desabilitados -->
    <div *ngIf="pessoa" class="result">
      <div class="field">
        <label>Nome</label>
        <input type="text" [value]="pessoa.nome" disabled />
      </div>

      <div class="field">
        <label>CPF</label>
        <input type="text" [value]="pessoa.cpf" disabled />
      </div>

      <div class="field">
        <label>Cidade</label>
        <input type="text" [value]="pessoa.cidade" disabled />
      </div>

      <div class="field">
        <label>Estado</label>
        <input type="text" [value]="pessoa.estado?.nome || ''" disabled />
      </div>

      <div class="footer">
        <button class="btn btn-gray" type="button" (click)="voltar()">
          Voltar
        </button>
      </div>
    </div>
  </div>
</div>
