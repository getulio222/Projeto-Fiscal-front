<div class="container">
  <div class="header">Alteração</div>

  <div *ngIf="msgOk" class="alert alert-success">{{ msgOk }}</div>
  <div *ngIf="msgErro" class="alert alert-error">{{ msgErro }}</div>

  <div class="form-group">
    <label>CPF</label>
    <input [(ngModel)]="cpfBusca" name="cpfBusca" placeholder="Digite o CPF para buscar">
  </div>

  <div class="form-actions">
    <button class="btn btn-primary" type="button" (click)="buscar()" [disabled]="loadingBusca">
      {{ loadingBusca ? 'Buscando...' : 'Buscar' }}
    </button>
    <button class="btn btn-secondary" type="button" (click)="voltar()">Voltar</button>
  </div>

  <hr style="margin: 24px 0;">

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <div class="form-group">
      <label>Nome</label>
      <input formControlName="nome" placeholder="Nome completo">
    </div>

    <div class="form-group">
      <label>CPF</label>
      <input formControlName="cpf" placeholder="Somente números">
    </div>

    <div class="form-group">
      <label>Cidade</label>
      <input formControlName="cidade" placeholder="Cidade">
    </div>

    <div class="form-group">
      <label>Estado</label>
      <select formControlName="cd_estado">
        <option [ngValue]="null" disabled>Selecione...</option>
        <option *ngFor="let e of estados" [ngValue]="e.id">{{ e.nome }}</option>
      </select>
    </div>

    <div class="form-actions">
      <button class="btn btn-success" type="submit" [disabled]="loadingSalvar">
        {{ loadingSalvar ? 'Salvando...' : 'Salvar' }}
      </button>
      <button class="btn btn-secondary" type="button" (click)="voltar()">Voltar</button>
    </div>
  </form>
</div>
