<div class="page">
  <div class="card">
    <h2 class="title">Alteração</h2>

    <!-- Busca por CPF -->
    <div class="form-row">
      <div class="field">
        <label>CPF</label>
        <input
          type="text"
          [(ngModel)]="cpfBusca"
          placeholder="Informe o CPF para buscar"
        />
      </div>

      <div class="actions">
        <button class="btn btn-blue" type="button" (click)="buscar()">
          Buscar
        </button>
        <button class="btn btn-gray" type="button" (click)="voltar()">
          Voltar
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <div *ngIf="msg" class="msg">{{ msg }}</div>

    <!-- Formulário de edição -->
    <div class="result">
      <div class="field">
        <label>Nome</label>
        <input type="text" [(ngModel)]="nome" />
      </div>

      <div class="field">
        <label>CPF</label>
        <input type="text" [(ngModel)]="cpf" />
      </div>

      <div class="field">
        <label>Cidade</label>
        <input type="text" [(ngModel)]="cidade" />
      </div>

      <div class="actions bottom">
        <button class="btn btn-blue" type="button" (click)="salvar()">
          Salvar
        </button>
        <button class="btn btn-gray" type="button" (click)="voltar()">
          Voltar
        </button>
      </div>
    </div>
  </div>
</div>
